<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1.0" />
        <title>Budget Dashboard</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                background: #111;
                color: #e0e0e0;
                display: flex;
                justify-content: center;
                padding: 20px;
                min-height: 100vh;
            }
            .container {
                max-width: 1000px;
                width: 100%;
            }
            h1 {
                color: #fff;
                font-size: 22px;
                display: flex;
                align-items: center;
                gap: 10px;
                margin-bottom: 20px;
            }
            h2 {
                font-size: 15px;
                color: #aaa;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-bottom: 12px;
            }
            .month-nav {
                display: flex;
                align-items: center;
                gap: 10px;
                margin-bottom: 24px;
            }
            .month-nav button {
                background: #2a2a2a;
                color: #fff;
                border: none;
                padding: 6px 14px;
                border-radius: 6px;
                cursor: pointer;
                font-size: 15px;
            }
            .month-nav button:hover {
                background: #3a3a3a;
            }
            .month-nav select {
                background: #2a2a2a;
                color: #fff;
                border: none;
                padding: 6px 10px;
                border-radius: 6px;
                font-size: 14px;
            }
            .month-nav .label {
                font-size: 16px;
                font-weight: 600;
                min-width: 100px;
                text-align: center;
            }
            .layout {
                display: grid;
                grid-template-columns: 280px 1fr;
                gap: 20px;
            }
            .card {
                background: #1a1a1a;
                border-radius: 10px;
                padding: 16px;
                margin-bottom: 16px;
            }
            .stat {
                margin-bottom: 4px;
                display: flex;
                justify-content: space-between;
                padding: 6px 0;
            }
            .stat span:first-child {
                color: #888;
            }
            .stat .val {
                font-weight: 600;
            }
            .stat .pos {
                color: #4ade80;
            }
            .stat .neg {
                color: #f87171;
            }
            .stat.total {
                border-top: 1px solid #333;
                margin-top: 4px;
                padding-top: 10px;
                font-size: 15px;
            }
            .quick-add {
                display: flex;
                gap: 8px;
                margin-bottom: 14px;
            }
            .quick-add button {
                flex: 1;
                padding: 10px;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                font-size: 14px;
                font-weight: 600;
                color: #fff;
            }
            .quick-add button.income {
                background: #166534;
            }
            .quick-add button.income:hover {
                background: #15803d;
            }
            .quick-add button.expense {
                background: #7f1d1d;
            }
            .quick-add button.expense:hover {
                background: #991b1b;
            }
            .form-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.6);
                justify-content: center;
                align-items: center;
                z-index: 100;
            }
            .form-overlay.open {
                display: flex;
            }
            .form {
                background: #1a1a1a;
                padding: 24px;
                border-radius: 12px;
                width: 360px;
            }
            .form h3 {
                margin-bottom: 16px;
                color: #fff;
            }
            .form input,
            .form select {
                width: 100%;
                background: #2a2a2a;
                color: #fff;
                border: 1px solid #333;
                padding: 10px 12px;
                border-radius: 6px;
                font-size: 14px;
                margin-bottom: 10px;
            }
            .form input:focus,
            .form select:focus {
                outline: none;
                border-color: #4ade80;
            }
            .form-row {
                display: flex;
                gap: 10px;
            }
            .form-row input {
                flex: 1;
            }
            .form-actions {
                display: flex;
                gap: 8px;
                margin-top: 6px;
            }
            .form-actions button {
                flex: 1;
                padding: 10px;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                font-size: 14px;
                font-weight: 600;
            }
            .form-actions .btn-save {
                background: #2563eb;
                color: #fff;
            }
            .form-actions .btn-save:hover {
                background: #3b82f6;
            }
            .form-actions .btn-cancel {
                background: #333;
                color: #ccc;
            }
            .form-actions .btn-cancel:hover {
                background: #444;
            }
            .txn-list {
                list-style: none;
            }
            .txn-item {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 10px 0;
                border-bottom: 1px solid #222;
            }
            .txn-item:last-child {
                border-bottom: none;
            }
            .txn-date {
                color: #666;
                font-size: 13px;
                min-width: 70px;
            }
            .txn-type {
                font-size: 12px;
                font-weight: 600;
                padding: 2px 8px;
                border-radius: 4px;
                min-width: 50px;
                text-align: center;
            }
            .txn-type.income {
                background: #16653433;
                color: #4ade80;
            }
            .txn-type.expense {
                background: #7f1d1d33;
                color: #f87171;
            }
            .txn-amount {
                font-weight: 600;
                margin-left: auto;
                min-width: 80px;
                text-align: right;
            }
            .txn-desc {
                color: #aaa;
                font-size: 13px;
                flex: 1;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .txn-actions {
                display: flex;
                gap: 4px;
            }
            .txn-actions button {
                background: none;
                border: none;
                color: #666;
                cursor: pointer;
                padding: 4px;
                border-radius: 4px;
                font-size: 14px;
            }
            .txn-actions button:hover {
                background: #333;
                color: #fff;
            }
            .budget-item {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 10px 0;
                border-bottom: 1px solid #222;
            }
            .budget-item:last-child {
                border-bottom: none;
            }
            .budget-item .b-label {
                min-width: 90px;
                color: #aaa;
            }
            .budget-item .b-amount {
                font-weight: 600;
                flex: 1;
            }
            .budget-item button {
                background: none;
                border: none;
                color: #666;
                cursor: pointer;
                padding: 4px;
                border-radius: 4px;
            }
            .budget-item button:hover {
                background: #333;
                color: #fff;
            }
            .budget-add {
                display: flex;
                gap: 8px;
                margin-top: 10px;
            }
            .budget-add input {
                background: #2a2a2a;
                color: #fff;
                border: 1px solid #333;
                padding: 8px 10px;
                border-radius: 6px;
                font-size: 13px;
                flex: 1;
            }
            .budget-add input:focus {
                outline: none;
                border-color: #4ade80;
            }
            .budget-add button {
                background: #2563eb;
                color: #fff;
                border: none;
                padding: 8px 5px;
                border-radius: 6px;
                cursor: pointer;
                font-weight: 600;
            }
            .budget-add button:hover {
                background: #3b82f6;
            }
            .empty {
                color: #555;
                text-align: center;
                padding: 20px;
                font-size: 14px;
            }
            .error-banner {
                display: none;
                background: #7f1d1d;
                color: #fca5a5;
                padding: 10px 16px;
                border-radius: 8px;
                margin-bottom: 16px;
                font-size: 14px;
            }
            .loading {
                color: #555;
                text-align: center;
                padding: 20px;
            }
            @media (max-width: 700px) {
                .layout {
                    grid-template-columns: 1fr;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Budget Dashboard</h1>
            <div class="error-banner" id="errorBanner"></div>
            <div class="month-nav">
                <button id="prevMonth">&#8592;</button>
                <span class="label" id="monthLabel">Mai 2026</span>
                <button id="nextMonth">&#8594;</button>
                <select id="monthSelect" style="margin-left: auto">
                    <option value="1">Jan</option>
                    <option value="2">Feb</option>
                    <option value="3">M&auml;r</option>
                    <option value="4">Apr</option>
                    <option value="5">Mai</option>
                    <option value="6">Jun</option>
                    <option value="7">Jul</option>
                    <option value="8">Aug</option>
                    <option value="9">Sep</option>
                    <option value="10">Okt</option>
                    <option value="11">Nov</option>
                    <option value="12">Dez</option>
                </select>
                <select id="yearSelect"></select>
            </div>
            <div class="layout">
                <div>
                    <div class="card">
                        <h2>Report</h2>
                        <div id="reportContent">
                            <div class="loading">Lade...</div>
                        </div>
                    </div>
                    <div class="card">
                        <h2>Budgets</h2>
                        <div id="budgetList">
                            <div class="loading">Lade...</div>
                        </div>
                    </div>
                </div>
                <div>
                    <div class="card">
                        <div class="quick-add">
                            <button class="income" onclick="openForm('income')">
                                + Einnahme
                            </button>
                            <button
                                class="expense"
                                onclick="openForm('expense')"
                            >
                                - Ausgabe
                            </button>
                        </div>
                        <h2>Transaktionen</h2>
                        <div id="txnList">
                            <div class="loading">Lade...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="form-overlay" id="formOverlay">
            <div class="form">
                <h3 id="formTitle">Neue Transaktion</h3>
                <select id="formType">
                    <option value="income">Einnahme</option>
                    <option value="expense">Ausgabe</option>
                </select>
                <input
                    id="formAmount"
                    type="number"
                    step="0.01"
                    placeholder="Betrag"
                    autofocus
                />
                <input
                    id="formDesc"
                    type="text"
                    placeholder="Beschreibung (optional)"
                />
                <input id="formDate" type="datetime-local" />
                <div class="form-actions">
                    <button class="btn-save" onclick="saveForm()">
                        Speichern
                    </button>
                    <button class="btn-cancel" onclick="closeForm()">
                        Abbrechen
                    </button>
                </div>
            </div>
        </div>

        <script>
            const API = "http://localhost:1234";
            let currentMonth = new Date().getMonth() + 1;
            let currentYear = new Date().getFullYear();
            let editId = null;

            function showError(msg) {
                const el = document.getElementById("errorBanner");
                el.textContent = msg;
                el.style.display = msg ? "block" : "none";
            }

            // --- Year select ---
            (function initYears() {
                const s = document.getElementById("yearSelect");
                for (let y = currentYear - 2; y <= currentYear + 2; y++) {
                    const o = document.createElement("option");
                    o.value = y;
                    o.textContent = y;
                    s.appendChild(o);
                }
                s.value = currentYear;
            })();

            function updateNav() {
                document.getElementById("monthLabel").textContent =
                    [
                        "Januar",
                        "Februar",
                        "M&auml;rz",
                        "April",
                        "Mai",
                        "Juni",
                        "Juli",
                        "August",
                        "September",
                        "Oktober",
                        "November",
                        "Dezember",
                    ][currentMonth - 1] +
                    " " +
                    currentYear;
                document.getElementById("monthSelect").value = currentMonth;
                document.getElementById("yearSelect").value = currentYear;
            }

            document.getElementById("monthSelect").onchange = function () {
                currentMonth = +this.value;
                refresh();
            };
            document.getElementById("yearSelect").onchange = function () {
                currentYear = +this.value;
                refresh();
            };
            document.getElementById("prevMonth").onclick = function () {
                currentMonth--;
                if (currentMonth < 1) {
                    currentMonth = 12;
                    currentYear--;
                }
                refresh();
            };
            document.getElementById("nextMonth").onclick = function () {
                currentMonth++;
                if (currentMonth > 12) {
                    currentMonth = 1;
                    currentYear++;
                }
                refresh();
            };

            async function api(url, opts = {}) {
                try {
                    const r = await fetch(API + url, {
                        headers: { "Content-Type": "application/json" },
                        ...opts,
                    });
                    if (!r.ok) {
                        const t = await r.text();
                        showError(t || r.statusText);
                        return null;
                    }
                    if (r.status === 204) return true;
                    if (opts.method === "DELETE") return true;
                    return await r.json();
                } catch (e) {
                    showError("Verbindungsfehler: " + e.message);
                    return null;
                }
            }

            async function refresh() {
                updateNav();
                await Promise.all([
                    loadReport(),
                    loadBudgets(),
                    loadTransactions(),
                ]);
            }

            async function loadReport() {
                const el = document.getElementById("reportContent");
                const d = await api(
                    "/report?month=" + currentMonth + "&year=" + currentYear,
                );
                if (!d || d.error) {
                    el.innerHTML =
                        '<div class="empty">Keine Daten f&uuml;r diesen Monat</div>';
                    return;
                }
                el.innerHTML = `
    <div class="stat"><span>Budget</span><span class="val">${d.budget ? d.budget.toFixed(2) + "&#128;" : "---"}</span></div>
    <div class="stat"><span>Einnahmen</span><span class="val pos">+${d.income.toFixed(2)}&#128;</span></div>
    <div class="stat"><span>Ausgaben</span><span class="val neg">-${d.expenses.toFixed(2)}&#128;</span></div>
    <div class="stat"><span>&#220;brig (Budget)</span><span class="val ${d.remaining >= 0 ? "pos" : "neg"}">${d.budget != null ? (d.remaining >= 0 ? "+" : "") + d.remaining.toFixed(2) + "&#128;" : "---"}</span></div>
    <div class="stat total"><span>Saldo</span><span class="val ${d.change >= 0 ? "pos" : "neg"}">${d.change >= 0 ? "+" : ""}${d.change.toFixed(2)}&#128;</span></div>
  `;
            }

            async function loadBudgets() {
                const el = document.getElementById("budgetList");
                const d = await api("/budgets");
                if (!d || d.length === 0) {
                    el.innerHTML = `<div class="empty">Keine Budgets</div><div class="budget-add"><input id="bAmount" type="number" step="0.01" placeholder="Betrag"><button onclick="addBudget()">+ Budget</button></div>`;
                    return;
                }
                el.innerHTML =
                    d
                        .map(
                            (b) => `
    <div class="budget-item">
      <span class="b-label">${["Jan", "Feb", "M&auml;r", "Apr", "Mai", "Jun", "Jul", "Aug", "Sep", "Okt", "Nov", "Dez"][b.month - 1]} ${b.year}</span>
      <span class="b-amount">${b.amount.toFixed(2)}&#128;</span>
      <button onclick="deleteBudget(${b.id})" title="L&ouml;schen">&#128465;</button>
    </div>
  `,
                        )
                        .join("") +
                    `<div class="budget-add"><input id="bAmount" type="number" step="0.01" placeholder="Betrag"><button onclick="addBudget()">+ Budget</button></div>`;
            }

            async function loadTransactions() {
                const el = document.getElementById("txnList");
                const d = await api("/transactions");
                if (!d || d.length === 0) {
                    el.innerHTML =
                        '<div class="empty">Keine Transaktionen</div>';
                    return;
                }
                el.innerHTML =
                    '<ul class="txn-list">' +
                    d
                        .sort((a, b) => new Date(b.date) - new Date(a.date))
                        .map((t) => {
                            const dt = new Date(t.date);
                            const ds =
                                String(dt.getDate()).padStart(2, "0") +
                                "." +
                                String(dt.getMonth() + 1).padStart(2, "0");
                            const cls =
                                t.type === "income" ? "income" : "expense";
                            return `<li class="txn-item">
      <span class="txn-date">${ds}</span>
      <span class="txn-type ${cls}">${t.type === "income" ? "Ein" : "Aus"}</span>
      <span class="txn-desc">${t.description || ""}</span>
      <span class="txn-amount ${cls}">${t.type === "income" ? "+" : "-"}${t.amount.toFixed(2)}&#128;</span>
      <span class="txn-actions">
        <button onclick="editTxn(${t.id})" title="Bearbeiten">&#9998;</button>
        <button onclick="deleteTxn(${t.id})" title="L&ouml;schen">&#128465;</button>
      </span>
    </li>`;
                        })
                        .join("") +
                    "</ul>";
            }

            // --- Transaction form ---
            function openForm(type) {
                editId = null;
                document.getElementById("formTitle").textContent =
                    "Neue Transaktion";
                document.getElementById("formType").value = type;
                document.getElementById("formAmount").value = "";
                document.getElementById("formDesc").value = "";
                const now = new Date();
                now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                document.getElementById("formDate").value = now
                    .toISOString()
                    .slice(0, 16);
                document.getElementById("formOverlay").classList.add("open");
                setTimeout(
                    () => document.getElementById("formAmount").focus(),
                    100,
                );
            }

            function closeForm() {
                document.getElementById("formOverlay").classList.remove("open");
            }

            async function saveForm() {
                const type = document.getElementById("formType").value;
                const amount = parseFloat(
                    document.getElementById("formAmount").value,
                );
                const description = document.getElementById("formDesc").value;
                const date = new Date(
                    document.getElementById("formDate").value,
                ).toISOString();
                if (!amount || amount <= 0) {
                    showError("Bitte g&uuml;ltigen Betrag eingeben");
                    return;
                }
                const body = { type, amount, description, date };
                if (editId) {
                    const r = await api("/transactions/" + editId, {
                        method: "PUT",
                        body: JSON.stringify(body),
                    });
                    if (r) closeForm();
                } else {
                    const r = await api("/transactions", {
                        method: "POST",
                        body: JSON.stringify(body),
                    });
                    if (r) closeForm();
                }
                refresh();
            }

            function editTxn(id) {
                editId = id;
                document.getElementById("formTitle").textContent =
                    "Transaktion bearbeiten";
                document.getElementById("formOverlay").classList.add("open");
                setTimeout(
                    () => document.getElementById("formAmount").focus(),
                    100,
                );
            }

            async function deleteTxn(id) {
                if (!confirm("Wirklich l&ouml;schen?")) return;
                const r = await api("/transactions/" + id, {
                    method: "DELETE",
                });
                if (r) refresh();
            }

            // --- Budget ---
            async function addBudget() {
                const el = document.getElementById("bAmount");
                const amount = parseFloat(el.value);
                if (!amount || amount <= 0) {
                    showError("Bitte g&uuml;ltigen Betrag eingeben");
                    return;
                }
                const r = await api("/budgets", {
                    method: "POST",
                    body: JSON.stringify({
                        amount,
                        month: currentMonth,
                        year: currentYear,
                    }),
                });
                if (r) refresh();
            }

            async function deleteBudget(id) {
                if (!confirm("Budget l&ouml;schen?")) return;
                const r = await api("/budgets/" + id, { method: "DELETE" });
                if (r) refresh();
            }

            // Keyboard: Escape closes form
            document.addEventListener("keydown", (e) => {
                if (e.key === "Escape") closeForm();
            });

            // Init
            refresh();
        </script>
    </body>
</html>
